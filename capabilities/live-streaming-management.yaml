naftiko: 1.0.0-alpha2
info:
  label: Amazon Interactive Video Service - Live Streaming Management
  description: Unified capability for Developer, Media Engineer to manage managed live streaming with low latency for interactive
    applications operations.
  tags:
  - Live Streaming
  - Video
  - AWS
  - Media
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: ivs
    baseUri: https://ivs.us-east-1.amazonaws.com
    description: Amazon Interactive Video Service REST API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: resources
      path: /
      description: Amazon Interactive Video Service resources
      operations:
      - name: list-channels
        method: GET
        description: List Channels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: live-streaming-management-api
    description: Unified REST API for live streaming management.
    resources:
    - path: /v1/resources
      name: resources
      description: Amazon Interactive Video Service resources
      operations:
      - method: GET
        name: list-channels
        description: List Channels
        call: ivs.list-channels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: live-streaming-management-mcp
    transport: http
    description: MCP server for AI-assisted live streaming management.
    tools:
    - name: list-channels
      description: Amazon Interactive Video Service List Channels
      hints:
        readOnly: true
        openWorld: true
      call: ivs.list-channels
      outputParameters:
      - type: object
        mapping: $.
    - name: create-channel
      description: Amazon Interactive Video Service Create Channel
      hints:
        readOnly: false
      call: ivs.create-channel
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-channel
      description: Amazon Interactive Video Service Delete Channel
      hints:
        readOnly: false
      call: ivs.delete-channel
      outputParameters:
      - type: object
        mapping: $.
    - name: get-channel
      description: Amazon Interactive Video Service Get Channel
      hints:
        readOnly: true
        openWorld: true
      call: ivs.get-channel
      outputParameters:
      - type: object
        mapping: $.
    - name: list-stream-keys
      description: Amazon Interactive Video Service List Stream Keys
      hints:
        readOnly: true
        openWorld: true
      call: ivs.list-stream-keys
      outputParameters:
      - type: object
        mapping: $.
    - name: create-stream-key
      description: Amazon Interactive Video Service Create Stream Key
      hints:
        readOnly: false
      call: ivs.create-stream-key
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-stream
      description: Amazon Interactive Video Service Stop Stream
      hints:
        readOnly: false
      call: ivs.stop-stream
      outputParameters:
      - type: object
        mapping: $.
    - name: list-recordings
      description: Amazon Interactive Video Service List Recordings
      hints:
        readOnly: true
        openWorld: true
      call: ivs.list-recordings
      outputParameters:
      - type: object
        mapping: $.
