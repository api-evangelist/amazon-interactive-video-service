apis:
  - aid: amazon-interactive-video-service:amazon-ivs-api
    name: Amazon IVS API
    description: >-
      The Amazon IVS API provides programmatic access to create and manage
      channels, stream keys, playback key pairs, recording configurations, and
      chat rooms for low-latency interactive live streaming applications.
