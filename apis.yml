aid: amazon-interactive-video-service
name: Amazon Interactive Video Service
description: >-
  Amazon Interactive Video Service (IVS) is a managed live streaming solution
  that is quick and easy to set up, and ideal for creating interactive video
  experiences. It provides SDKs and APIs to build engaging live video
  experiences with low-latency streaming capabilities.
